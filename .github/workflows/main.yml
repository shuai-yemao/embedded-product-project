name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 代码质量检查
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Run code formatting check
        run: |
          black --check .
          isort --check-only .

      - name: Run linting
        run: |
          flake8 .

  # 固件构建测试
  firmware-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [stm32f4, stm32f1, esp32]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        if: matrix.target != 'esp32'

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        if: matrix.target == 'esp32'

      - name: Build firmware
        run: |
          cd 04_Firmware
          mkdir -p build
          cd build
          cmake ..
          make

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v3
        with:
          name: firmware-${{ matrix.target }}
          path: 04_Firmware/build/*.bin

  # 单元测试
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          pytest 07_Tests/unit/ --cov=05_Software --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests

  # 文档生成
  documentation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Generate API documentation
        run: |
          cd 06_Tools/web-control
          npm install
          npm run docs

      - name: Upload documentation
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: docs/

  # Web控制端构建
  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build web control
        run: |
          cd 06_Tools/web-control
          npm install
          npm run build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v3
        with:
          name: web-control
          path: 06_Tools/web-control/dist/

  # APP构建
  app-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'

      - name: Build Flutter app
        run: |
          cd 06_Tools/app-control
          flutter pub get
          flutter build apk

      - name: Upload app artifacts
        uses: actions/upload-artifact@v3
        with:
          name: app-control
          path: 06_Tools/app-control/build/app/outputs/flutter-apk/

  # 部署文档
  deploy-docs:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [code-quality, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
